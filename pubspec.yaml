name: hungry_app
description: "Hungry App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # For Ui
  flutter_svg: ^2.2.1
  flutter_screenutil: ^5.9.3

  # Dependency Injection
  get_it: ^8.2.0

  # Api Calls
  dio: ^5.9.0

  # Local Data
  shared_preferences: ^2.5.3
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  #

dev_dependencies:
  flutter_test:
    sdk: flutter

  #
  flutter_launcher_icons: ^0.14.4
  #
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/3.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/

  fonts:
    - family: LuckiestGuy
      fonts:
        - asset: assets/fonts/LuckiestGuy-Regular.ttf
